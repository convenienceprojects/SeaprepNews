name: Update Prep News

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get the website files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch the latest news
        run: python update_news.py

      - name: Publish the update
        run: |
          git config user.name  "Prep News Bot"
          git config user.email "actions@github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No new stories today."
          else
            git commit -m "Auto-update news $(date -u +%Y-%m-%d)"
            git push
          fi
